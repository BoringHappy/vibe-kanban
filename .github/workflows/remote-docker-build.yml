name: Build and Push Remote Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'crates/remote/**'
      - 'packages/remote-web/**'
      - 'shared/**'
      - '.github/workflows/remote-docker-build.yml'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag as latest'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: remote-docker-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/remote

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup SSH Agent for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VK_PRIVATE_DEPLOY_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' || github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/remote/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          ssh: default=${{ env.SSH_AUTH_SOCK }}
          build-args: |
            FEATURES=${{ secrets.REMOTE_FEATURES || '' }}
            POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY || '' }}
            POSTHOG_API_ENDPOINT=${{ secrets.POSTHOG_API_ENDPOINT || '' }}
            SENTRY_DSN_REMOTE=${{ secrets.SENTRY_DSN_REMOTE || '' }}
            VITE_RELAY_API_BASE_URL=${{ secrets.VITE_RELAY_API_BASE_URL || '' }}
            VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY=${{ secrets.VITE_PUBLIC_REACT_VIRTUOSO_LICENSE_KEY || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Stop SSH agent
        if: always()
        run: ssh-agent -k
